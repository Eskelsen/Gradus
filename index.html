<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#d7f2ff">
  <title>Gradus</title>
  <link rel="icon" href="./icon.png" type="image/png">
  <link rel="apple-touch-icon" href="./icon.png">

  <style>
    :root {
      --ink: #143047;
      --muted: #657889;
      --panel: rgba(255, 255, 255, 0.88);
      --line: rgba(20, 48, 71, 0.12);
      --blue: #1b638f;
      --blue-soft: #d7f2ff;
      --mint: #41b883;
      --sun: #f6b84b;
      --shadow: 0 24px 70px rgba(27, 99, 143, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      padding: 20px;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(65, 184, 131, 0.22), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(246, 184, 75, 0.22), transparent 28rem),
        linear-gradient(145deg, #edf9ff 0%, #f7fbff 48%, #f1fff8 100%);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(100%, 460px);
      position: relative;
    }

    .container {
      width: 100%;
      padding: 24px;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .brand-icon {
      width: 64px;
      height: 64px;
      flex: 0 0 auto;
      padding: 5px;
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 14px 32px rgba(27, 99, 143, 0.18);
    }

    .brand-icon img {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 18px;
      object-fit: cover;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 9vw, 46px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .form {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
    }

    label span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    input {
      width: 100%;
      min-height: 56px;
      padding: 14px 16px;
      font-size: 16px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      border-radius: 16px;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    input::placeholder {
      color: #9aa8b4;
    }

    input:focus {
      border-color: rgba(27, 99, 143, 0.55);
      box-shadow: 0 0 0 4px rgba(27, 99, 143, 0.12);
      transform: translateY(-1px);
    }

    .results {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .output {
      min-height: 86px;
      display: grid;
      align-content: center;
      gap: 7px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .output strong {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .output strong::before {
      content: "";
      width: 9px;
      height: 9px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--blue);
    }

    .output:nth-child(2) strong::before {
      background: var(--mint);
    }

    .output:nth-child(3) strong::before {
      background: var(--sun);
    }

    .output span {
      display: block;
      min-height: 32px;
      font-size: clamp(25px, 7vw, 34px);
      font-weight: 800;
      line-height: 1;
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .footnote {
      margin: 16px 4px 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      text-align: center;
    }

    @media (min-width: 700px) {
      body {
        padding: 32px;
      }

      .container {
        padding: 30px;
      }
    }

    @media (max-width: 380px) {
      body {
        padding: 12px;
      }

      .container {
        padding: 18px;
        border-radius: 22px;
      }

      .brand {
        gap: 12px;
      }

      .brand-icon {
        width: 56px;
        height: 56px;
        border-radius: 18px;
      }

      .output {
        min-height: 78px;
        padding: 14px;
      }
    }
  </style>
</head>
<body>

<main class="app" aria-labelledby="app-title">
  <div class="container">
    <header class="brand">
      <div class="brand-icon" aria-hidden="true">
        <img src="./icon.png" alt="">
      </div>
      <div>
        <h1 id="app-title">Gradus</h1>
        <p class="subtitle">Converta calorias em passos e veja o tempo aproximado de caminhada.</p>
      </div>
    </header>

    <section class="form" aria-label="Dados do alimento">
      <div class="field">
        <label for="calorias100">
          Calorias
          <span>por 100 g/ml</span>
        </label>
        <input type="number" id="calorias100" placeholder="Ex: 250" min="0" inputmode="decimal">
      </div>

      <div class="field">
        <label for="peso">
          Quantidade
          <span>g/ml totais</span>
        </label>
        <input type="number" id="peso" placeholder="Ex: 300" min="0" inputmode="decimal">
      </div>
    </section>

    <section class="results" aria-label="Resultado">
      <div class="output">
        <strong>Calorias totais</strong>
        <span id="caloriasTotal">-</span>
      </div>

      <div class="output">
        <strong>Passos necessários</strong>
        <span id="passos">-</span>
      </div>

      <div class="output">
        <strong>Tempo estimado</strong>
        <span id="tempo">-</span>
      </div>
    </section>

    <p class="footnote">Estimativa baseada em 20 passos por caloria e ritmo médio de 100 passos por minuto.</p>
  </div>
</main>

<script>
  const caloriasInput = document.getElementById('calorias100');
  const pesoInput = document.getElementById('peso');

  const caloriasTotalEl = document.getElementById('caloriasTotal');
  const passosEl = document.getElementById('passos');
  const tempoEl = document.getElementById('tempo');

  function limpar() {
    caloriasTotalEl.textContent = '-';
    passosEl.textContent = '-';
    tempoEl.textContent = '-';
  }

  function calcular() {
    const calorias100 = parseFloat(caloriasInput.value);
    const peso = parseFloat(pesoInput.value);

    if (
      isNaN(calorias100) ||
      isNaN(peso) ||
      calorias100 <= 0 ||
      peso <= 0
    ) {
      limpar();
      return;
    }

    // Calorias totais
    const caloriasTotal = Math.round((calorias100 / 100) * peso);

    // Passos
    const passos = Math.round(caloriasTotal * 20);

    // Tempo (minutos totais)
    const tempoTotal = passos / 100;

    const minutos = Math.floor(tempoTotal);
    const segundos = Math.floor((tempoTotal - minutos) * 60);

    caloriasTotalEl.textContent = caloriasTotal.toLocaleString('pt-BR');
    passosEl.textContent = passos.toLocaleString('pt-BR');
    tempoEl.textContent = `${minutos} min ${segundos} s`;
  }

  caloriasInput.addEventListener('input', calcular);
  pesoInput.addEventListener('input', calcular);

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>

</body>
</html>
